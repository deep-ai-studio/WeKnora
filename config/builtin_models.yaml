# WeKnora — 医美知识库专用模型配置
# 使用阿里云 DashScope (Qwen) API

builtin_models:
  # ── LLM 对话模型 ──
  - id: builtin-qwen-chat
    type: KnowledgeQA
    source: remote
    is_default: true
    name: qwen-plus
    parameters:
      base_url: ${QWEN_BASE_URL}
      api_key: ${QWEN_API_KEY}
      provider: openai          # DashScope 兼容 OpenAI 协议

  # ── Embedding 向量模型 ──
  - id: builtin-qwen-embedding
    type: Embedding
    source: remote
    is_default: true
    name: text-embedding-v3
    parameters:
      base_url: ${QWEN_BASE_URL}
      api_key: ${QWEN_API_KEY}
      provider: openai
      embedding_parameters:
        dimension: 1024
        truncate_prompt_tokens: 0

  # ── VLLM 视觉模型（扫描PDF OCR）──
  - id: builtin-qwen-vl
    type: VLLM
    source: remote
    is_default: false
    name: qwen-vl-plus
    parameters:
      base_url: ${QWEN_BASE_URL}
      api_key: ${QWEN_API_KEY}
      provider: openai

  # ── Rerank 重排序 ──
  # 阿里 DashScope Rerank API 使用独立端点（非 OpenAI 兼容），
  # provider 设置为 aliyun，代码将自动使用正确的 Rerank URL。
  - id: builtin-qwen-rerank
    type: Rerank
    source: remote
    is_default: true
    name: gte-rerank
    parameters:
      api_key: ${QWEN_API_KEY}
      provider: aliyun
